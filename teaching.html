<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <link rel="stylesheet" href="masoud-style.css">
    <link rel="shortcut icon" href="image/ucdfavicon.png">
    <meta name="keywords" content="Masoud, Jasbi, Masoud Jasbi, Masoud Jafarali Jasbi, Masoud Jasbi linguistics, Masoud Jasbi stanford, Masoud Jasbi Stanford linguistics, Persian, language acquisition, semantics, pragmatics"/>
    <title>Masoud Jasbi</title>
    <style>
        .intro-box {
            background: #e8e8e8; border: 1.5px solid #ccc; border-radius: 8px;
            padding: 20px 22px 32px; margin-bottom: 0;
            display: flex; align-items: center; gap: 20px;
        }
        .intro-content  { flex: 1; }
        .intro-title    { font-weight: 700; font-size: 18px; margin-bottom: 4px; }
        .intro-subtitle { font-weight: 600; color: #555; font-size: 16px; margin-bottom: 10px; }
        .intro-text     { font-size: 15px; color: #444; margin: 0; line-height: 1.6; }

        .filter-section {
            display: flex; justify-content: center;
            position: relative; z-index: 2;
            margin-top: -22px; margin-bottom: 24px;
        }
        .filter-grid {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .filter-btn {
            padding: 9px 14px; border-radius: 6px; cursor: pointer;
            font-weight: 700; font-size: 14px; border: 2px solid var(--color);
            background: var(--bg); color: var(--color); transition: background 0.15s, color 0.15s;
        }
        .filter-btn:hover  { opacity: 0.85; }
        .filter-btn.active { background: var(--color); color: #fff; }
        .filter-btn[data-topic="cogsci"]        { --bg: #E6F1FB; --color: #0C447C; }
        .filter-btn[data-topic="learning"]      { --bg: #E1F5EE; --color: #085041; }
        .filter-btn[data-topic="computational"] { --bg: #e7dddd; --color: #be0303; }
        .filter-btn[data-topic="semantics"]     { --bg: #FAEEDA; --color: #633806; }
        .filter-btn[data-topic="syntax"]        { --bg: #FAEEDA; --color: #633806; }

        .course-card {
            display: block; background: #fff; border: 1.5px solid #d0d0d0; border-radius: 8px;
            padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s;
            text-decoration: none; color: inherit;
        }
        .course-card:hover { border-color: #888; text-decoration: none; color: inherit; }
        .course-card-body  { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
        .course-card-left  { flex: 1; }
        .course-title      { font-weight: 700; font-size: 18px; line-height: 1.4; color: #111; }
        .course-year       { font-size: 16px; color: #666; margin-top: 4px; }
        .course-desc       { font-size: 14px; color: #444; margin-top: 6px; line-height: 1.55; }
        .course-logo       { flex-shrink: 0; display: flex; align-items: center; }
        .course-card-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee;
        }
        .course-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .course-students {
            font-size: 12px; font-weight: 600; color: #555;
            background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px;
            padding: 3px 10px; white-space: nowrap; flex-shrink: 0;
        }
        .intro-stats { display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .intro-stat {
            background: #d4d4d4; border-radius: 6px; padding: 8px 16px;
            text-align: center; min-width: 90px;
        }
        .stat-num   { display: block; font-weight: 700; font-size: 20px; color: #222; }
        .stat-label { display: block; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
        .topic-tag {
            padding: 2px 9px; border-radius: 20px; font-size: 11px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; display: inline-block;
        }
        .topic-tag.cogsci        { background: #E6F1FB; color: #0C447C; }
        .topic-tag.learning      { background: #E1F5EE; color: #085041; }
        .topic-tag.computational { background: #e7dddd; color: #be0303; }
        .topic-tag.semantics     { background: #FAEEDA; color: #633806; }
        .topic-tag.syntax        { background: #FAEEDA; color: #633806; }
        .course-section { margin-bottom: 0; }
        .course-section-title {
            background: #f5dc90; border-radius: 6px; padding: 7px 14px;
            font-weight: 700; font-size: 16px; margin-bottom: 12px; margin-top: 16px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="container-fluid">

        <script src="nav.js"></script>


        <div id="main-content" class="intro-box">
            <div class="intro-content">
                <div class="intro-title">Teaching Philosophy</div>
                <div class="intro-subtitle">Subtitle</div>
                <p class="intro-text">Your text here.</p>
            </div>
            <div class="intro-stats">
                <div class="intro-stat">
                    <span class="stat-num" id="total-classes">0</span>
                    <span class="stat-label">Courses</span>
                </div>
                <div class="intro-stat">
                    <span class="stat-num" id="total-students">0</span>
                    <span class="stat-label">Students</span>
                </div>
            </div>
        </div><!-- /.intro-box -->
        <div class="filter-section">
            <div class="filter-grid">
                <button class="filter-btn" data-topic="learning">Language Learning and Acquisition</button>
                <button class="filter-btn" data-topic="computational">Computational Models and Machine Learning</button>
                <button class="filter-btn" data-topic="cogsci">Intro Linguistics and Cognitive Science</button>
                <button class="filter-btn" data-topic="semantics">Semantics</button>
                <button class="filter-btn" data-topic="syntax">Syntax</button>
            </div>
        </div>

        <div id="courses-container"></div>

        </div>

  <script src="teaching-data.js"></script>
  <script>

  var topicLabels = {
    cogsci: 'Ling &amp; Cog Sci',
    learning: 'Language Learning',
    computational: 'Computational',
    semantics: 'Semantics',
    syntax: 'Syntax'
  };

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildCard(c) {
    var topicsAttr = c.topics.join(' ');
    var tagsHtml = c.topics.map(function(t) {
      return '<span class="topic-tag ' + t + '">' + (topicLabels[t] || t) + '</span>';
    }).join('');
    var yearLine = c.year + (c.quarter ? ' ' + c.quarter : '');
    var inner = [
      '  <div class="course-card-body">',
      '    <div class="course-card-left">',
      '      <div class="course-title">' + esc(c.code) + ': ' + esc(c.title) + '</div>',
      '      <div class="course-year">' + yearLine + '</div>',
      '      <div class="course-desc">'  + esc(c.desc)  + '</div>',
      '    </div>',
      '    <div class="course-logo"><img src="' + esc(c.logo) + '" width="' + c.logoWidth + '" alt="' + esc(c.logoAlt) + '"></div>',
      '  </div>',
      '  <div class="course-card-footer">',
      '    <div class="course-tags">' + tagsHtml + '</div>',
      '    <div class="course-students">' + (c.students || 0) + ' students</div>',
      '  </div>'
    ].join('\n');
    if (c.link) {
      return '<a href="' + esc(c.link) + '" class="course-card" data-topics="' + topicsAttr + '">\n' + inner + '\n</a>';
    } else {
      return '<div class="course-card" data-topics="' + topicsAttr + '">\n' + inner + '\n</div>';
    }
  }

  function render() {
    var sections = [];
    var sectionMap = {};
    courses.forEach(function(c) {
      var sec = c.section || 'Other';
      if (!sectionMap[sec]) { sectionMap[sec] = []; sections.push(sec); }
      sectionMap[sec].push(c);
    });
    var html = '';
    sections.forEach(function(sec) {
      html += '<div class="course-section" data-section="' + esc(sec) + '">';
      html += '<div class="course-section-title">' + esc(sec) + '</div>';
      sectionMap[sec].forEach(function(c) { html += buildCard(c); });
      html += '</div>';
    });
    document.getElementById('courses-container').innerHTML = html;
    document.getElementById('total-classes').textContent = courses.length;
    document.getElementById('total-students').textContent = courses.reduce(function(s, c) { return s + (c.students || 0); }, 0);
    attachFilters();
  }

  function attachFilters() {
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        btn.classList.toggle('active');
        applyFilter();
      });
    });
  }

  function applyFilter() {
    var active = [];
    document.querySelectorAll('.filter-btn.active').forEach(function(b) { active.push(b.dataset.topic); });
    document.querySelectorAll('.course-card').forEach(function(card) {
      var cardTopics = card.dataset.topics ? card.dataset.topics.split(' ').filter(Boolean) : [];
      var show = active.length === 0 || active.every(function(t) { return cardTopics.indexOf(t) !== -1; });
      card.style.display = show ? '' : 'none';
    });
    document.querySelectorAll('.course-section').forEach(function(sec) {
      var allHidden = true;
      sec.querySelectorAll('.course-card').forEach(function(card) {
        if (card.style.display !== 'none') allHidden = false;
      });
      sec.style.display = allHidden ? 'none' : '';
    });
  }

  document.addEventListener('DOMContentLoaded', render);
  </script>
        
<!-- JavaScript: placed at the end of the document so the pages load faster -->
    
<!-- jQuery library -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>

<!-- Latest compiled and minified Bootstrap JavaScript -->
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
        
  </body>
</html>
