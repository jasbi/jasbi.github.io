<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="masoud-style.css">
    <link rel="shortcut icon" href="image/ucdfavicon.png">
    <meta name="keywords" content="Masoud, Jasbi, Masoud Jasbi, Masoud Jafarali Jasbi, Masoud Jasbi linguistics, Masoud Jasbi stanford, Masoud Jasbi Stanford linguistics, Persian, language acquisition, semantics, pragmatics"/>
    <title>Masoud Jasbi</title>
    <style>
        /* ── Index section headers ────────────────────────────────── */
        .index-section {
            margin-bottom: 28px;
        }
        .index-section-header {
            background: #f5dc90; padding: 7px 14px;
            font-weight: 700; border-radius: 5px; margin-bottom: 12px; font-size: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-more {
            font-size: 13px; font-weight: 600; color: #555;
            text-decoration: none;
        }
        .section-more:hover { color: #222; text-decoration: none; }

        /* ── Publication cards ────────────────────────────────────── */
        .pub-card {
            background: #fff; border: 1.5px solid #d0d0d0; border-radius: 8px;
            padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s;
        }
        .pub-card:hover { border-color: #888; }
        .pub-card.has-abstract .pub-card-main { cursor: pointer; }
        .pub-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .pub-title { font-weight: 700; font-size: 16px; flex: 1; line-height: 1.4; }
        .pub-links { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
        .btn-pub {
            display: inline-block; padding: 2px 9px; border-radius: 4px;
            font-size: 12px; font-weight: 600; text-decoration: none;
            border: 1px solid; cursor: pointer; white-space: nowrap;
        }
        .btn-pub:hover { text-decoration: none; opacity: 0.8; }
        .btn-pdf    { background: #E6F1FB; color: #0C447C; border-color: #0C447C; }
        .btn-doi    { background: #f0f0f0; color: #444; border-color: #888; }
        .btn-github { background: #EEEDFE; color: #3C3489; border-color: #3C3489; }
        .pub-authors { margin-top: 6px; font-size: 16px; color: #333; }
        .pub-venue   { font-size: 14px; color: #555; margin-top: 2px; }
        .pub-abstract {
            margin-top: 10px; font-size: 14px; line-height: 1.55;
            padding: 10px 12px; background: #f8f8f8;
            border-left: 3px solid #ccc; border-radius: 0 4px 4px 0;
        }
        .pub-card-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee;
        }
        .pub-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-cite {
            padding: 3px 11px; background: #f4f4f4; border: 1px solid #aaa;
            border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; color: #333;
        }
        .btn-cite:hover { background: #e8e8e8; }
        .pub-cite-panel {
            margin-top: 10px; background: #f5f5f5; border-radius: 5px; padding: 12px 14px; font-size: 13px;
        }
        .cite-label {
            font-weight: 700; color: #555; margin-bottom: 4px;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .cite-apa { margin-bottom: 12px; line-height: 1.5; }
        .cite-bibtex {
            background: #eee; border-radius: 4px; padding: 10px; font-size: 12px;
            white-space: pre-wrap; font-family: monospace; margin: 0; overflow-x: auto;
        }

        /* ── Course cards ─────────────────────────────────────────── */
        .course-card {
            display: block; background: #fff; border: 1.5px solid #d0d0d0; border-radius: 8px;
            padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s;
            text-decoration: none; color: inherit;
        }
        .course-card:hover { border-color: #888; text-decoration: none; color: inherit; }
        .course-card-body  { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
        .course-card-left  { flex: 1; }
        .course-title      { font-weight: 700; font-size: 16px; line-height: 1.4; color: #111; }
        .course-year       { font-size: 14px; color: #666; margin-top: 4px; }
        .course-desc       { font-size: 12px; color: #444; margin-top: 6px; line-height: 1.55; }
        .course-logo       { flex-shrink: 0; display: flex; align-items: center; }
        .course-card-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee;
        }
        .course-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .course-students {
            font-size: 12px; font-weight: 600; color: #555;
            background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px;
            padding: 3px 10px; white-space: nowrap; flex-shrink: 0;
        }

        /* ── Service cards ────────────────────────────────────────── */
        .service-card {
            display: block; background: #fff; border: 1.5px solid #d0d0d0; border-radius: 8px;
            padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s;
            text-decoration: none; color: inherit;
        }
        .service-card:hover { border-color: #888; text-decoration: none; color: inherit; }
        .service-card-body  { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
        .service-card-left  { flex: 1; }
        .service-title      { font-weight: 700; font-size: 16px; line-height: 1.4; color: #111; }
        .service-years      { font-size: 14px; color: #666; margin-top: 4px; }
        .service-desc       { font-size: 12px; color: #444; margin-top: 6px; line-height: 1.55; }
        .service-logo       { flex-shrink: 0; display: flex; align-items: center; }
        .service-card-footer {
            display: flex; justify-content: flex-start; align-items: center;
            margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee;
        }
        .service-tags { display: flex; gap: 5px; flex-wrap: wrap; }

        /* ── Topic tags (all pages combined) ─────────────────────── */
        .topic-tag {
            padding: 2px 9px; border-radius: 20px; font-size: 11px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; display: inline-block;
        }
        .topic-tag.learning      { background: #E1F5EE; color: #085041; }
        .topic-tag.computational { background: #e7dddd; color: #be0303; }
        .topic-tag.experimental  { background: #E6F1FB; color: #0C447C; }
        .topic-tag.theoretical   { background: #FAEEDA; color: #633806; }
        .topic-tag.cogsci        { background: #E6F1FB; color: #0C447C; }
        .topic-tag.semantics     { background: #FAEEDA; color: #633806; }
        .topic-tag.syntax        { background: #FAEEDA; color: #633806; }
        .topic-tag.undergrad     { background: #ebebeb; color: #444; }
        .topic-tag.grad          { background: #ebebeb; color: #444; }
        .topic-tag.department    { background: #ebebeb; color: #444; }
        .topic-tag.college       { background: #ebebeb; color: #444; }
    </style>
</head>

<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="container-fluid">

        <script src="nav.js"></script>

        <div id="main-content" class="row">
            <div class="col-md-3">
                <img width="90%" src="image/main_image.jpg" alt="Masoud Jasbi">
                <p class="lead"><br>Assistant Professor,<br> Linguistics and Cognitive Science,<br> University of California, Davis<br></p>
                <div class="address">
                    <p><a href="mailto:jasbi@ucdavis.edu">&#x1f4e7; jasbi@ucdavis.edu</a></p>
                    <p><a href="https://github.com/jasbi">&#x1f4bb; https://github.com/jasbi</a></p>
                    <p><a href="https://scholar.google.com/citations?hl=en&user=cMjcFL4AAAAJ">&#x1f4da; https://scholar.google.com</a></p>
                </div>
                <p><br></p>
            </div>
            <div class="col-md-9">

                <div id="research-section" class="index-section">
                    <div class="index-section-header">
                        Representative Publications
                        <a href="research.html" class="section-more">More →</a>
                    </div>
                    <div id="research-cards"></div>
                </div>

                <div id="teaching-section" class="index-section">
                    <div class="index-section-header">
                        Recent Teaching
                        <a href="teaching.html" class="section-more">More →</a>
                    </div>
                    <div id="teaching-cards"></div>
                </div>

                <div id="service-section" class="index-section">
                    <div class="index-section-header">
                        Recent Service
                        <a href="service.html" class="section-more">More →</a>
                    </div>
                    <div id="service-cards"></div>
                </div>

            </div>
        </div>

        <div class="row">
            <div class="footer">
                <div class="row">
                    <div class="col-md-3 text-right">
                        <div class="seal">
                            <img align="middle" src="image/UCDavis.png" width="60%" alt="UC Davis Seal">
                        </div>
                    </div>
                    <div class="col-md-9 text-left"></div>
                </div>
            </div>
        </div>

    </div><!-- /.container-fluid -->

    <script src="research-data.js"></script>
    <script src="teaching-data.js"></script>
    <script src="service-data.js"></script>

    <script>
    var topicLabels = {
        learning: 'Learning', computational: 'Computational',
        experimental: 'Experimental', theoretical: 'Theoretical',
        cogsci: 'Ling &amp; Cog Sci', semantics: 'Semantics', syntax: 'Syntax',
        undergrad: 'Undergrad', grad: 'Grad', department: 'Department', college: 'College'
    };

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildPubCard(p) {
        var topicsAttr = p.topics.join(' ');
        var hasAbstract = p.abstract && p.abstract.length > 0;
        var linksHtml = '';
        if (p.links.pdf)    linksHtml += '<a href="' + esc(p.links.pdf) + '" class="btn-pub btn-pdf" target="_blank" rel="noopener" onclick="event.stopPropagation()">PDF</a>';
        if (p.links.doi)    linksHtml += '<a href="' + esc(p.links.doi) + '" class="btn-pub btn-doi" target="_blank" rel="noopener" onclick="event.stopPropagation()">DOI</a>';
        if (p.links.github) linksHtml += '<a href="' + esc(p.links.github) + '" class="btn-pub btn-github" target="_blank" rel="noopener" onclick="event.stopPropagation()">GitHub</a>';
        var venueHtml    = p.venue   ? '<div class="pub-venue">' + p.venue + '</div>' : '';
        var abstractHtml = hasAbstract ? '<div class="pub-abstract" style="display:none">' + esc(p.abstract) + '</div>' : '';
        var bibtexEscaped = esc(p.bibtex);
        var apaEscaped    = esc(p.apa);
        return [
            '<div class="pub-card' + (hasAbstract ? ' has-abstract' : '') + '" data-topics="' + topicsAttr + '">',
            '  <div class="pub-card-main"' + (hasAbstract ? ' role="button" tabindex="0" aria-expanded="false"' : '') + '>',
            '    <div class="pub-card-header">',
            '      <div class="pub-title">' + esc(p.title) + '</div>',
            '      <div class="pub-links">' + linksHtml + '<button class="btn-cite" aria-expanded="false">Cite</button></div>',
            '    </div>',
            '    <div class="pub-authors">' + esc(p.authors) + '</div>',
            venueHtml,
            abstractHtml,
            '  </div>',
            '  <div class="pub-cite-panel" style="display:none">',
            '    <div class="cite-label">APA</div>',
            '    <div class="cite-apa">' + apaEscaped + '</div>',
            '    <div class="cite-label" style="margin-top:10px">BibTeX</div>',
            '    <pre class="cite-bibtex">' + bibtexEscaped + '</pre>',
            '  </div>',
            '</div>'
        ].join('\n');
    }

    function buildCourseCard(c) {
        var topicsAttr = c.topics.join(' ');
        var yearLine = c.year + (c.quarter ? ' ' + c.quarter : '');
        var inner = [
            '  <div class="course-card-body">',
            '    <div class="course-card-left">',
            '      <div class="course-title">' + esc(c.code) + ': ' + esc(c.title) + '</div>',
            '      <div class="course-year">' + yearLine + '</div>',
            '      <div class="course-desc">'  + esc(c.desc)  + '</div>',
            '    </div>',
            '    <div class="course-logo"><img src="' + esc(c.logo) + '" width="' + c.logoWidth + '" alt="' + esc(c.logoAlt) + '"></div>',
            '  </div>'
        ].join('\n');
        if (c.link) {
            return '<a href="' + esc(c.link) + '" class="course-card" data-topics="' + topicsAttr + '">\n' + inner + '\n</a>';
        } else {
            return '<div class="course-card" data-topics="' + topicsAttr + '">\n' + inner + '\n</div>';
        }
    }

    function buildServiceCard(s) {
        var topicsAttr = s.topics.join(' ');
        var inner = [
            '  <div class="service-card-body">',
            '    <div class="service-card-left">',
            '      <div class="service-title">' + esc(s.title) + '</div>',
            '      <div class="service-years">' + esc(s.years) + '</div>',
            '      <div class="service-desc">'  + esc(s.desc)  + '</div>',
            '    </div>',
            '    <div class="service-logo"><img src="' + esc(s.logo) + '" width="' + s.logoWidth + '" alt="' + esc(s.logoAlt) + '"></div>',
            '  </div>'
        ].join('\n');
        return '<div class="service-card" data-topics="' + topicsAttr + '">\n' + inner + '\n</div>';
    }

    function attachPubHandlers() {
        document.querySelectorAll('.pub-card.has-abstract .pub-card-main').forEach(function(main) {
            main.addEventListener('click', function(e) {
                if (e.target.closest('.pub-links')) return;
                var abstract = main.querySelector('.pub-abstract');
                var open = abstract.style.display !== 'none';
                abstract.style.display = open ? 'none' : 'block';
                main.setAttribute('aria-expanded', String(!open));
            });
            main.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); main.click(); }
            });
        });
        document.querySelectorAll('.btn-cite').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var panel = btn.closest('.pub-card').querySelector('.pub-cite-panel');
                var open = panel.style.display !== 'none';
                panel.style.display = open ? 'none' : 'block';
                btn.setAttribute('aria-expanded', String(!open));
            });
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var researchHtml = '';
        papers.forEach(function(p) {
            if (p.firstPage === true) researchHtml += buildPubCard(p);
        });
        document.getElementById('research-cards').innerHTML = researchHtml;
        document.getElementById('research-section').style.display = researchHtml ? '' : 'none';

        var teachingHtml = '';
        courses.forEach(function(c) {
            if (c.firstPage === true) teachingHtml += buildCourseCard(c);
        });
        document.getElementById('teaching-cards').innerHTML = teachingHtml;
        document.getElementById('teaching-section').style.display = teachingHtml ? '' : 'none';

        var serviceHtml = '';
        services.forEach(function(s) {
            if (s.firstPage === true) serviceHtml += buildServiceCard(s);
        });
        document.getElementById('service-cards').innerHTML = serviceHtml;
        document.getElementById('service-section').style.display = serviceHtml ? '' : 'none';

        attachPubHandlers();
    });
    </script>

    <!-- jQuery library -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <!-- Popper -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <!-- Bootstrap JS -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
